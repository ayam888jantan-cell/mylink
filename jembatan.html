<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --yellow: #FFE600; --green: #00E87A; --pink: #FF3CAC;
    --blue: #00C2FF; --orange: #FF6B00; --dark: #0a0a0a; --white: #ffffff;
  }
  body {
    background: var(--yellow); font-family: 'Nunito', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0; background-size: 18px 18px;
    background-image: radial-gradient(circle, #0002 1px, transparent 1px); pointer-events: none; z-index: 0;
  }
  .topbar {
    width: 100%; background: var(--dark); border-bottom: 4px solid var(--pink);
    padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .brand { font-family: 'Bangers', cursive; font-size: 26px; letter-spacing: 3px; color: var(--yellow); text-shadow: 3px 3px 0 var(--orange); }
  .brand span { color: var(--green); text-shadow: 3px 3px 0 #008a48; }
  .skip-area { display: flex; align-items: center; gap: 10px; }
  .countdown-pill { background: var(--pink); border-radius: 99px; padding: 6px 14px; font-size: 13px; font-weight: 900; color: var(--white); border: 3px solid var(--dark); box-shadow: 3px 3px 0 var(--dark); letter-spacing: 1px; }
  .btn-skip {
    display: none; align-items: center; gap: 6px; padding: 8px 20px; background: var(--green); border: 3px solid var(--dark);
    border-radius: 99px; color: var(--dark); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 900; cursor: pointer; text-decoration: none; box-shadow: 4px 4px 0 var(--dark); transition: transform 0.1s, box-shadow 0.1s; letter-spacing: 1px;
    animation: bounce 0.5s infinite alternate;
  }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-4px); } }
  .btn-skip:hover { transform: translate(-2px,-2px) scale(1.05); box-shadow: 6px 6px 0 var(--dark); }
  .btn-skip.visible { display: flex; }
  .hero { position: relative; z-index: 1; text-align: center; padding: 30px 20px 16px; }
  .hero-badge {
    display: inline-block; background: var(--pink); color: var(--white); font-family: 'Bangers', cursive; font-size: 14px; letter-spacing: 3px;
    padding: 4px 16px; border-radius: 99px; border: 3px solid var(--dark); box-shadow: 3px 3px 0 var(--dark); margin-bottom: 14px; animation: wiggle 2s ease-in-out infinite;
  }
  @keyframes wiggle { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
  .hero h1 { font-family: 'Bangers', cursive; font-size: clamp(44px, 12vw, 72px); color: var(--dark); line-height: 0.95; letter-spacing: 4px; -webkit-text-stroke: 2px var(--dark); paint-order: stroke fill; margin-bottom: 10px; }
  .hero h1 .line1 { color: var(--white); -webkit-text-stroke: 3px var(--dark); display: block; }
  .hero h1 .line2 { color: var(--pink); -webkit-text-stroke: 3px var(--dark); display: block; font-size: clamp(28px, 8vw, 52px); }
  .hero-sub { display: inline-block; background: var(--dark); color: var(--yellow); font-size: 13px; font-weight: 800; padding: 6px 18px; border-radius: 8px; margin-top: 10px; letter-spacing: 1px; }
  .stat-bar { position: relative; z-index: 1; width: 100%; max-width: 680px; padding: 0 16px; margin: 16px auto 0; }
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .stat-card { background: var(--white); border: 3px solid var(--dark); border-radius: 14px; box-shadow: 4px 4px 0 var(--dark); padding: 12px 10px; text-align: center; }
  .stat-card .num { font-family: 'Bangers', cursive; font-size: 28px; letter-spacing: 2px; display: block; line-height: 1; margin-bottom: 2px; }
  .stat-card .lbl { font-size: 10px; font-weight: 800; color: #555; text-transform: uppercase; letter-spacing: 1px; }
  .stat-card:nth-child(1) .num { color: var(--pink); }
  .stat-card:nth-child(2) .num { color: var(--blue); }
  .stat-card:nth-child(3) .num { color: var(--green); }
  .ad-wrap { position: relative; z-index: 1; width: 100%; max-width: 680px; padding: 0 16px; margin: 16px auto 0; }
  .ad-slot { width: 100%; min-height: 270px; background: var(--white); border-radius: 20px; border: 4px solid var(--dark); box-shadow: 6px 6px 0 var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 35px; padding-bottom: 15px; position: relative; overflow: hidden; }
  .ad-slot::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: repeating-linear-gradient(90deg, var(--pink) 0, var(--pink) 20px, var(--yellow) 20px, var(--yellow) 40px, var(--green) 40px, var(--green) 60px, var(--blue) 60px, var(--blue) 80px);
  }
  .ad-badge { position: absolute; top: 12px; left: 14px; background: var(--yellow); border: 2px solid var(--dark); border-radius: 6px; padding: 2px 10px; font-size: 10px; font-weight: 900; color: var(--dark); letter-spacing: 2px; text-transform: uppercase; box-shadow: 2px 2px 0 var(--dark); z-index: 10; }
  .progress-wrap { position: relative; z-index: 1; width: 100%; max-width: 680px; padding: 0 16px; margin: 18px auto 0; }
  .progress-top { display: flex; justify-content: space-between; font-size: 12px; font-weight: 900; color: var(--dark); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .progress-bar { width: 100%; height: 16px; background: var(--white); border-radius: 99px; border: 3px solid var(--dark); overflow: hidden; box-shadow: 3px 3px 0 var(--dark); }
  .progress-fill {
    height: 100%; background: repeating-linear-gradient(45deg, var(--pink) 0, var(--pink) 10px, var(--orange) 10px, var(--orange) 20px); border-radius: 99px; width: 0%; transition: width 5s linear; background-size: 28px 28px; animation: stripe 0.5s linear infinite;
  }
  @keyframes stripe { from { background-position: 0 0; } to { background-position: 28px 0; } }
  .ad-wrap-2 { position: relative; z-index: 1; width: 100%; max-width: 680px; padding: 0 16px; margin: 18px auto 24px; }
  .ad-slot-sm { width: 100%; min-height: 85px; background: var(--white); border-radius: 14px; border: 3px solid var(--dark); box-shadow: 4px 4px 0 var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 25px; padding-bottom: 10px; position: relative; overflow: hidden; }
  .footer { position: relative; z-index: 1; text-align: center; padding: 16px; font-size: 12px; font-weight: 800; color: var(--dark); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .overlay { display: none; position: fixed; inset: 0; background: var(--dark); z-index: 999; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .overlay.show { display: flex; }
  .overlay-text { font-family: 'Bangers', cursive; font-size: 42px; letter-spacing: 4px; color: var(--yellow); text-shadow: 4px 4px 0 var(--orange); animation: blink 0.4s ease-in-out infinite alternate; }
  @keyframes blink { from{opacity:1} to{opacity:0.3} }
</style>

<script>
  const SKIP_DELAY = 5;

  // Fake Visitor Counter
  const base = 1500;
  const rand = Math.floor(Math.random() * 400);
  let count = base + rand;
  document.getElementById('visitorCount').textContent = count.toLocaleString('id-ID');

  // Ambil parameter tujuan
  const params = new URLSearchParams(window.location.search);
  let destination = params.get('to') || 'https://google.com';
  try { new URL(destination); } catch(e) { destination = 'https://google.com'; }

  let seconds = SKIP_DELAY;
  const countEl = document.getElementById('countNum');
  const pillEl = document.getElementById('countdownPill');
  const btnSkip = document.getElementById('btnSkip');
  const fill = document.getElementById('progressFill');
  const pctLabel = document.getElementById('pctLabel');

  // Animasi Loading Bar
  setTimeout(() => { fill.style.width = '100%'; }, 50);

  const timer = setInterval(() => {
    seconds--;
    countEl.textContent = seconds;
    
    const pct = Math.round(((SKIP_DELAY - seconds) / SKIP_DELAY) * 100);
    pctLabel.textContent = pct + '%';
    
    if (seconds <= 0) {
      clearInterval(timer);
      pillEl.style.display = 'none';
      btnSkip.classList.add('visible'); // Wajib klik manual
    }
  }, 1000);

  function doRedirect() {
    document.getElementById('overlay').classList.add('show');
    setTimeout(() => { 
      window.location.href = destination; 
    }, 500);
  }
</script>
